name: kartoonia
description: "Kartoonia - Arabic cartoons for Android TV"
publish_to: 'none'

version: 1.11.0+7

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1

  # Video playback via media_kit (libmpv). We keep ONE long-lived Player for the
  # whole app and just swap its media per episode/trailer, so a hardware video
  # decoder is acquired ONCE and never thrashed — the tiny Android-TV decoder
  # pool can no longer be exhausted. (The old video_player path built a new
  # ExoPlayer/decoder per episode and leaked them until an app restart.)
  # httpHeaders are forwarded to libmpv for the manifest AND every segment, so
  # the CDN's required Referer/UA/Origin headers are still sent on each request.
  media_kit: ^1.1.11
  media_kit_video: ^1.2.5
  media_kit_libs_video: ^1.0.5

  # Networking + images
  http: ^1.2.2
  cached_network_image: ^3.4.1

  # The trailer/theme-song YouTube player
  # Persistence
  shared_preferences: ^2.3.3
  youtube_explode_dart: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

# Branded launcher icon (adaptive on Android 8+). TV banner is handled
# separately via android:banner -> @drawable/banner.
flutter_launcher_icons:
  android: "ic_launcher"
  ios: false
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#0F1430"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"
  min_sdk_android: 30

flutter:
  uses-material-design: true

  assets:
    - assets/arabictoons_catalog.json
    - assets/stardima_catalog.json
    # Room art with the CRT screen punched out (transparent hole): the theme
    # video is drawn UNDER these so the painted TV frame covers its edges.
    - assets/tv-clean-cut.png
    - assets/phone-clean-cut.png
    # Audible CRT "snow" played while the next reel resolves.
    - assets/crt-static.wav

  fonts:
    - family: Fredoka
      fonts:
        - asset: assets/fonts/Fredoka-Medium.ttf
          weight: 500
        - asset: assets/fonts/Fredoka-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Fredoka-Bold.ttf
          weight: 700
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito-Bold.ttf
          weight: 700
        - asset: assets/fonts/Nunito-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Nunito-Black.ttf
          weight: 900
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
        - asset: assets/fonts/Cairo-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Cairo-Black.ttf
          weight: 900
